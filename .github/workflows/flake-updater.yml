name: "Update Flake Deps"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 6"

jobs:
  update_flake:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v5
        with:
          token: "${{ secrets.TEST_TOKEN }}"
      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            auto-optimise-store = true
            access-tokens = github.com=${{ secrets.TEST_TOKEN }}
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org https://merrinx-emacs.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= merrinx-emacs.cachix.org-1:raHdfOzHuUJ02k7FuPa9Hfk87sNeQLUNyISGZqgmKCc=
          install_url: https://releases.nixos.org/nix/nix-2.32.5/install
      - name: Set up cachix
        uses: cachix/cachix-action@v17
        with:
          name: merrinx-emacs
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Set up git
        run: |
          git config user.email "gako358@outlook.com"
          git config user.name "Gako358"
      - name: Update the flake
        run: nix flake update
      - name: Store flake.lock
        uses: actions/upload-artifact@v5
        with:
          name: flake_lock
          path: flake.lock

  build_flake:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: [update_flake]
    steps:
      - name: Clean up root space and mount /nix on /mnt
        run: |
          echo "=== Before cleanup ==="
          df -h

          sudo apt-get remove -y \
            '^llvm-.*' 'php.*' '^dotnet-.*' \
            azure-cli google-cloud-cli google-cloud-sdk \
            hhvm google-chrome-stable firefox powershell \
            mono-devel microsoft-edge-stable || true
          sudo apt-get autoremove -y
          sudo apt-get clean

          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache /opt/microsoft
          sudo rm -rf /usr/local/share/boost /usr/local/.ghcup
          sudo rm -rf /usr/share/swift /usr/local/graalvm
          sudo rm -rf /usr/local/share/chromium /usr/local/lib/node_modules
          sudo rm -rf /usr/share/miniconda /usr/local/share/powershell
          sudo rm -rf /usr/share/az_* "$AGENT_TOOLSDIRECTORY"
          sudo journalctl --vacuum-size=10M

          echo "=== After cleanup ==="
          df -h

          sudo mkdir -p /nix
          sudo mkdir -p /mnt/nix
          sudo mount --bind /mnt/nix /nix
          sudo chown -R runner:runner /nix

          echo "=== Final layout ==="
          df -h

      - name: Clone repository
        uses: actions/checkout@v5
        with:
          token: "${{ secrets.TEST_TOKEN }}"

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            auto-optimise-store = true
            access-tokens = github.com=${{ secrets.TEST_TOKEN }}
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org https://merrinx-emacs.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= merrinx-emacs.cachix.org-1:raHdfOzHuUJ02k7FuPa9Hfk87sNeQLUNyISGZqgmKCc=
            max-jobs = 2
            cores = 2
            max-silent-time = 1800
          install_url: https://releases.nixos.org/nix/nix-2.32.5/install

      - name: Set up cachix
        uses: cachix/cachix-action@v17
        with:
          name: merrinx-emacs
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Restore flake.lock
        uses: actions/download-artifact@v5
        with:
          name: flake_lock

      - name: Build configured Emacs
        run: |
          nix build .#packages.x86_64-linux.default --out-link result-emacs
          nix build .#packages.x86_64-linux.config-compiled --out-link result-config

      - name: Push to cachix
        run: |
          nix path-info --recursive \
            $(readlink -f result-emacs) \
            $(readlink -f result-config) \
            | cachix push merrinx-emacs

  check_flake:
    runs-on: ubuntu-latest
    needs: [update_flake]
    continue-on-error: true
    steps:
      - name: Clean up root space and mount /nix on /mnt
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache /opt/microsoft
          sudo rm -rf /usr/local/share/boost /usr/local/.ghcup
          sudo rm -rf /usr/share/swift /usr/local/graalvm
          sudo apt-get clean

          sudo mkdir -p /nix
          sudo mkdir -p /mnt/nix
          sudo mount --bind /mnt/nix /nix
          sudo chown -R runner:runner /nix

          df -h

      - name: Clone repository
        uses: actions/checkout@v5
        with:
          token: "${{ secrets.TEST_TOKEN }}"

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            auto-optimise-store = true
            access-tokens = github.com=${{ secrets.TEST_TOKEN }}
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/ https://nix-community.cachix.org https://merrinx-emacs.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= merrinx-emacs.cachix.org-1:raHdfOzHuUJ02k7FuPa9Hfk87sNeQLUNyISGZqgmKCc=
          install_url: https://releases.nixos.org/nix/nix-2.32.5/install

      - name: Set up cachix
        uses: cachix/cachix-action@v17
        with:
          name: merrinx-emacs
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Restore flake.lock
        uses: actions/download-artifact@v5
        with:
          name: flake_lock

      - name: Check flake
        run: nix flake check --keep-going

  push_update:
    runs-on: ubuntu-latest
    permissions: write-all
    needs: [update_flake, build_flake, check_flake]
    steps:
      - name: Clone repository
        uses: actions/checkout@v5
        with:
          token: "${{ secrets.TEST_TOKEN }}"

      - name: Restore flake.lock
        uses: actions/download-artifact@v5
        with:
          name: flake_lock

      - name: Set up git
        run: |
          git config user.email "gako358@outlook.com"
          git config user.name "Gako358"

      - name: Create and merge PR
        run: |
          git switch -c updates-${{ github.run_id }}
          if git diff --quiet flake.lock; then
            echo "No changes to flake.lock, skipping PR"
            exit 0
          fi
          git commit -am "flake.lock: Update"
          git push -u origin updates-${{ github.run_id }}
          PR=$(gh pr create \
            --assignee Gako358 \
            --base main \
            --body "Automatic flake update on $(date -I)" \
            --fill \
            --label bot \
            --title "Auto update $(date -I)")
          gh pr merge $PR --rebase --delete-branch
        env:
          GITHUB_TOKEN: ${{ secrets.TEST_TOKEN }}

